# Nginx-Konfiguration für diary-api.skybasevario.com
# =============================================================================
# ACHTUNG: Vor Aktivierung die bestehende Reverse-Proxy-Konfiguration prüfen:
#
#   sudo nginx -T            # falls Host-Nginx vorhanden
#   docker exec <container> nginx -T  # falls Nginx im Container läuft
#   docker compose ls        # alle laufenden Stacks prüfen
#
# Diese Datei wird als Read-Only in den bpdiary_nginx-Container gemountet.
# Sie überschreibt KEINE bestehende Nginx-Konfiguration des Hosts oder SkyBase.
# =============================================================================

server {
    listen 80;
    server_name diary-api.skybasevario.com;

    # Strikte Client-Request-Größe (Foto-Uploads berücksichtigen)
    client_max_body_size 50M;

    # Security-Header
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Healthcheck – direkt aus Nginx (kein Backend-Call nötig für Monitoring)
    location = /health {
        proxy_pass         http://api:5000/health;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        access_log off;
    }

    # Alle anderen Anfragen an die Flask-API
    location / {
        proxy_pass         http://api:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;

        # WebSocket-Support (für künftige Features)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # Fehlerseiten
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        return 503 '{"error": "Service temporarily unavailable"}';
        add_header Content-Type application/json;
    }
}

